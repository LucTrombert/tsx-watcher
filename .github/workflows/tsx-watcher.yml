name: TSX Watcher

on:
  schedule:
    # 9:30 AM ET — two crons to handle DST:
    # Summer EDT (UTC-4): 13:30 UTC = 9:30 ET  (Mar–Nov)
    - cron: '30 13 * * 1-5'
    # Winter EST (UTC-5): 14:30 UTC = 9:30 ET  (Nov–Mar)
    # Both fire year-round; watcher sleeps until market open so double-firing is harmless
    - cron: '30 14 * * 1-5'
    # Saturday 14:00 UTC = 10:00 ET — weekly ticker discovery scan
    - cron: '0 14 * * 6'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h max — covers 9:30–15:30 ET

    permissions:
      contents: write   # needed to push signals back to repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TSX Watcher
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DOW=$(date -u +%u)   # 1=Mon … 6=Sat 7=Sun
          if [ "$DOW" = "6" ]; then
            python watcher.py --discover
          else
            python watcher.py
          fi

      - name: Save signals to repo
        if: always()   # run even if watcher exits early
        run: |
          git config user.name  "TSX Watcher Bot"
          git config user.email "tsx-watcher@github-actions"
          git add data/signals/signals.log data/signals/seen_urls.json data/signals/open_positions.json data/signals/press_releases/ || true
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "signals: $(date -u '+%Y-%m-%d') market session"
          git pull --rebase origin main || true
          git push || true
