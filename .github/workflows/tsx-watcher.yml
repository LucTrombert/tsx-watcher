name: TSX Watcher

on:
  schedule:
    # Target: runner alive by 9:30 AM ET. GitHub Actions crons can be 1-2h late,
    # so we schedule 90 min early. The watcher sleeps until market open if it
    # starts before 9:30 — no harm, no duplicate signals.
    #
    # Summer EDT (UTC-4): 6:30 AM EDT = 10:30 UTC  (Mar–Nov) — lands by 7:00 AM ET
    - cron: '30 10 * * 1-5'
    # Winter EST (UTC-5): 6:30 AM EST = 11:30 UTC  (Nov–Mar) — lands by 7:00 AM ET
    - cron: '30 11 * * 1-5'
    # Both fire year-round; watcher sleeps until 7:00 AM ET pre-market open
    # then scans pre-market 7:00–9:30 and live signals 9:30–16:00
    #
    # Saturday 12:00 UTC = 8:00 AM ET — weekly ticker discovery scan
    - cron: '0 12 * * 6'
  workflow_dispatch:  # allow manual trigger from GitHub UI

concurrency:
  group: tsx-watcher-daily
  cancel-in-progress: false   # don't kill a running session — just block duplicate triggers

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 600   # 10h max — covers 6:30 AM ET startup + pre-market (7–9:30) + full session to 4 PM ET

    permissions:
      contents: write   # needed to push signals back to repo

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 before forced June 2nd deadline

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TSX Watcher
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DOW=$(date -u +%u)   # 1=Mon … 6=Sat 7=Sun
          if [ "$DOW" = "6" ]; then
            python watcher.py --discover
          else
            python watcher.py
          fi

      - name: Save signals to repo
        if: always()   # run even if watcher exits early
        run: |
          git config user.name  "TSX Watcher Bot"
          git config user.email "tsx-watcher@github-actions"
          # Add each file individually — a single git add with multiple args fails fast
          # on the first missing file (e.g. signals.log on quiet days), silently skipping
          # the rest. seen_urls.json MUST be committed every session or the cache resets.
          git add data/signals/seen_urls.json      || true
          git add data/signals/open_positions.json || true
          git add data/signals/signals.log         || true
          git add data/signals/press_releases/     || true
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "signals: $(date -u '+%Y-%m-%d') market session"
          git fetch origin main
          git rebase origin/main || git rebase --abort
          git push --force-with-lease || true
