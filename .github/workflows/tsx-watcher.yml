name: TSX Watcher

on:
  schedule:
    # Weekday triggers are handled by Make.com (workflow_dispatch), NOT cron.
    # GitHub crons fired 1–3h late and tangled in the concurrency lock, causing
    # pileups and startup failures. Make fires reliably at 6:55 AM (Run A) and
    # 12:30 PM ET (Run B). The only cron left is the weekly discovery scan.
    #
    # Saturday 12:00 UTC = 8:00 AM ET — weekly ticker discovery scan
    - cron: '0 12 * * 6'
  workflow_dispatch:  # Make.com + manual UI trigger
    inputs:
      until:
        description: 'Clean self-exit HH:MM ET. Morning Run A = "12:30"; afternoon Run B = leave blank.'
        required: false
        default: ''

concurrency:
  group: tsx-watcher-daily
  cancel-in-progress: false   # don't kill a running session — just block duplicate triggers

jobs:
  watch:
    runs-on: ubuntu-latest
    # GitHub enforces a HARD 6h (360 min) cap per job — timeout-minutes cannot
    # exceed it. A single 7AM–4PM run (~9h) was silently CANCELLED at the 6h mark,
    # losing the afternoon. Hence the two-run split: each slice stays well under
    # 6h. 350 is a safety net; the watcher self-exits before reaching it.
    timeout-minutes: 350

    permissions:
      contents: write   # needed to push signals back to repo

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 before forced June 2nd deadline

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TSX Watcher
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DOW=$(date -u +%u)   # 1=Mon … 6=Sat 7=Sun
          UNTIL="${{ github.event.inputs.until }}"
          if [ "$DOW" = "6" ]; then
            python watcher.py --discover
          elif [ -n "$UNTIL" ]; then
            # Run A (morning) — self-exit at the handoff time, no close summary
            python watcher.py --until "$UNTIL"
          else
            # Run B (afternoon) — runs to the 4 PM ET close, sends daily summary
            python watcher.py
          fi

      - name: Save signals to repo
        if: always()   # run even if watcher exits early
        run: |
          git config user.name  "TSX Watcher Bot"
          git config user.email "tsx-watcher@github-actions"
          # Add each file individually — a single git add with multiple args fails fast
          # on the first missing file (e.g. signals.log on quiet days), silently skipping
          # the rest. seen_urls.json MUST be committed every session or the cache resets.
          git add data/signals/seen_urls.json      || true
          git add data/signals/open_positions.json || true
          git add data/signals/signals.log         || true
          git add data/signals/press_releases/     || true
          # cluster_counts.json persists per-commodity daily counts across the
          # Run A -> Run B handoff (each run is a fresh checkout) so the
          # sector-cluster cap survives the morning->afternoon split.
          git add data/signals/cluster_counts.json || true
          # auto_added_tickers.json — the autonomous Saturday auto-adds. Committing it
          # is what makes a discovered ticker permanent: it's merged into the universe
          # on every subsequent run's startup.
          git add data/signals/auto_added_tickers.json || true
          # outcomes.json — the forward-return dataset (signal → D+1/D+3 at multiple
          # entries). This is the corpus that validates whether PR content has edge.
          git add data/signals/outcomes.json || true
          git add data/signals/paper_portfolio.json || true   # autonomous paper-trading account (simulated)
          git add data/signals/universe.json || true          # live universe + lifecycle status (dashboard)
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "signals: $(date -u '+%Y-%m-%d') market session"
          # Safe concurrent push — NEVER force-push (that clobbered signal data when
          # Run A and Run B raced). Retry fetch→rebase→push: signals.log union-merges
          # (.gitattributes) so both runs' lines survive; derived JSONs take this run's
          # fresh copy (-X theirs); a lost race just retries instead of dropping data.
          pushed=0
          for i in 1 2 3 4 5 6; do
            git fetch origin main
            if git rebase -X theirs origin/main; then
              if git push origin HEAD:main; then pushed=1; break; fi
            else
              git rebase --abort || true
            fi
            sleep $((RANDOM % 6 + 3))
          done
          [ "$pushed" = 1 ] && echo "Signals pushed" || echo "::warning::signals push failed after retries"
