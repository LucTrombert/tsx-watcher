name: TSX Watcher

on:
  schedule:
    # Target: runner alive by 9:30 AM ET. GitHub Actions crons can be 1-2h late,
    # so we schedule 90 min early. The watcher sleeps until market open if it
    # starts before 9:30 — no harm, no duplicate signals.
    #
    # Summer EDT (UTC-4): 8:00 AM EDT = 12:00 UTC  (Mar–Nov)
    - cron: '0 12 * * 1-5'
    # Winter EST (UTC-5): 8:00 AM EST = 13:00 UTC  (Nov–Mar)
    - cron: '0 13 * * 1-5'
    # Both fire year-round; watcher idle-loops until 9:30 so double-firing is harmless
    #
    # Saturday 12:00 UTC = 8:00 AM ET — weekly ticker discovery scan
    - cron: '0 12 * * 6'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 480   # 8h max — covers 8:00 AM ET startup + full session to 4 PM ET

    permissions:
      contents: write   # needed to push signals back to repo

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 before forced June 2nd deadline

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TSX Watcher
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DOW=$(date -u +%u)   # 1=Mon … 6=Sat 7=Sun
          if [ "$DOW" = "6" ]; then
            python watcher.py --discover
          else
            python watcher.py
          fi

      - name: Save signals to repo
        if: always()   # run even if watcher exits early
        run: |
          git config user.name  "TSX Watcher Bot"
          git config user.email "tsx-watcher@github-actions"
          git add data/signals/signals.log data/signals/seen_urls.json data/signals/open_positions.json data/signals/press_releases/ || true
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "signals: $(date -u '+%Y-%m-%d') market session"
          git pull --rebase origin main || true
          git push || true
